# Scheduled Letterboxd scraper: updates top 8 films and blur placeholders, then pushes to trigger deploy.
name: Scrape Letterboxd top films

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Letterboxd scraper
        env:
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_TMDB_API_KEY" ]; then
            echo "::error::Repository secret NEXT_PUBLIC_TMDB_API_KEY is not set. Add it in Settings → Secrets and variables → Actions (exact name: NEXT_PUBLIC_TMDB_API_KEY)."
            exit 1
          fi
          node scripts/scrape-letterboxd-top-films.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/topFilms.json app/data/blurPlaceholders.json
          git diff --staged --quiet || (git commit -m "chore: update Letterboxd top films and blur placeholders" && git push)
