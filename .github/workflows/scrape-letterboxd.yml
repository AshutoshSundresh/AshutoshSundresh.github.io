# Scheduled Letterboxd scraper: updates top 8 films and blur placeholders, commits if changed,
# then dispatches the Pages deploy workflow (GITHUB_TOKEN pushes do not trigger push workflows).
name: Scrape Letterboxd top films

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Letterboxd scraper
        env:
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_TMDB_API_KEY" ]; then
            echo "::error::Repository secret NEXT_PUBLIC_TMDB_API_KEY is not set. Add it in Settings → Secrets and variables → Actions (exact name: NEXT_PUBLIC_TMDB_API_KEY)."
            exit 1
          fi
          node scripts/scrape-letterboxd-top-films.js

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/topFilms.json app/data/blurPlaceholders.json
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update Letterboxd top films and blur placeholders"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.pushed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch Deploy Next.js site to Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run nextjs.yml --ref "${{ github.ref_name }}"
